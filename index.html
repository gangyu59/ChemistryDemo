<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学演示 Chemistry Demo</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <header>
        <h1>化学演示 Chemistry Demo</h1>
        <p>点击按钮探索各种物理化学现象 · Click a button to explore phenomena</p>
    </header>

    <canvas id="myCanvas" width="900" height="700"></canvas>

    <div class="button-grid">
        <div class="section-label">光学 Optics</div>
        <button class="btn-optics" id="showLensImaging">🔭 Lens Imaging</button>
        <button class="btn-wave"   id="showLightPolarization">🌀 Light Polarization</button>

        <div class="section-label">电磁 Electromagnetism</div>
        <button class="btn-electro" id="showMagneticField">🧲 Magnetic Field</button>
        <button class="btn-electro" id="showStaticElectricity">⚡ Static Electricity</button>

        <div class="section-label">热学 Thermodynamics</div>
        <button class="btn-thermo" id="showHeatConduction">🌡️ Heat Conduction</button>
        <button class="btn-thermo" id="showConvection">🌊 Convection</button>
        <button class="btn-thermo" id="showBlackbodyRadiation">🌟 Blackbody Radiation</button>

        <div class="section-label">化学 Chemistry</div>
        <button class="btn-chem" id="showColorChangeReaction">🧪 Chemical Reaction</button>
        <button class="btn-chem" id="showDryIceSublimation">🧊 Dry Ice Sublimation</button>

        <div class="section-label">地学 Earth Science</div>
        <button class="btn-geo" id="showVolcanicEruption">🌋 Volcanic Eruption</button>
    </div>

    <script src="static/js/lensImaging.js"></script>
    <script src="static/js/magneticField.js"></script>
    <script src="static/js/staticElectricity.js"></script>
    <script src="static/js/heatConduction.js"></script>
    <script src="static/js/convection.js"></script>
    <script src="static/js/colorChangeReaction.js"></script>
    <script src="static/js/volcanicEruption.js"></script>
    <script src="static/js/dryIceSublimation.js"></script>
    <script src="static/js/lightPolarization.js"></script>
    <script src="static/js/blackbodyRadiation.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
