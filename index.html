<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Demo</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Physics & Chemistry Visualizations</h1>
        <p>Click to explore simulations — drag objects to interact</p>
    </header>

    <canvas id="myCanvas" width="900" height="700"></canvas>

    <div class="button-grid">
        <div class="section-label">Optics</div>
        <button class="btn-optics" id="showLensImaging" type="button">🔭 Lens Imaging</button>
        <button class="btn-optics" id="showLightPolarization" type="button">🌈 Light Polarization</button>

        <div class="section-label">Electricity & Magnetism</div>
        <button class="btn-em" id="showMagneticField" type="button">🧲 Magnetic Field</button>
        <button class="btn-em" id="showStaticElectricity" type="button">⚡ Static Electricity</button>

        <div class="section-label">Thermodynamics</div>
        <button class="btn-thermo" id="showHeatConduction" type="button">🌡️ Heat Conduction</button>
        <button class="btn-thermo" id="showConvection" type="button">♨️ Convection</button>
        <button class="btn-thermo" id="showBlackbodyRadiation" type="button">☀️ Blackbody Radiation</button>

        <div class="section-label">Chemistry & Earth Science</div>
        <button class="btn-chem" id="showColorChangeReaction" type="button">🧪 Chemical Reaction</button>
        <button class="btn-chem" id="showDryIceSublimation" type="button">❄️ Dry Ice Sublimation</button>
        <button class="btn-chem" id="showVolcanicEruption" type="button">🌋 Volcanic Eruption</button>
    </div>

    <script src="static/js/lensImaging.js"></script>
    <script src="static/js/magneticField.js"></script>
    <script src="static/js/staticElectricity.js"></script>
    <script src="static/js/heatConduction.js"></script>
    <script src="static/js/convection.js"></script>
    <script src="static/js/colorChangeReaction.js"></script>
    <script src="static/js/volcanicEruption.js"></script>
    <script src="static/js/dryIceSublimation.js"></script>
    <script src="static/js/lightPolarization.js"></script>
    <script src="static/js/blackbodyRadiation.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
